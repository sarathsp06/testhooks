services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: testhooks
      POSTGRES_PASSWORD: testhooks
      POSTGRES_DB: testhooks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testhooks"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      DATABASE_URL: postgres://testhooks:testhooks@postgres:5432/testhooks?sslmode=disable
      PORT: ${PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
